apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-analysis-mcp
  namespace: default
  labels:
    app: code-analysis-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-analysis-mcp
  template:
    metadata:
      labels:
        app: code-analysis-mcp
    spec:
      containers:
        - name: code-analysis-mcp
          image: code-analysis-mcp:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: code-analysis-mcp
  namespace: default
  labels:
    app: code-analysis-mcp
spec:
  type: ClusterIP
  selector:
    app: code-analysis-mcp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
