apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-analysis-mcp
  namespace: duploservices-ai-suite
  labels:
    app: code-analysis-mcp
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: code-analysis-mcp
  template:
    metadata:
      labels:
        app: code-analysis-mcp
    spec:
      imagePullSecrets:
        - name: ecr-secret
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: code-analysis-mcp
          image: 732227444503.dkr.ecr.us-west-2.amazonaws.com/code-analysis-mcp:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "256m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 6
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 25
---
apiVersion: v1
kind: Service
metadata:
  name: code-analysis-mcp
  namespace: duploservices-ai-suite
  labels:
    app: code-analysis-mcp
spec:
  type: ClusterIP
  selector:
    app: code-analysis-mcp
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
